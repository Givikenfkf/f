name: Build postmarketOS for Moto G100

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      PMB_WORK: ${{ github.workspace }}/pmbootstrap-work
      PMB_EXPORT: ${{ github.workspace }}/postmarketos-export

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            curl \
            file \
            rsync \
            unzip \
            xz-utils \
            zstd \
            bzip2

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Initialize pmbootstrap
        run: |
          export PATH="$PWD/pmbootstrap:$PATH"
          python3 ./pmbootstrap/pmbootstrap.py -y -w "$PMB_WORK" init --shallow-initial-clone

      - name: Set device config
        run: |
          export PATH="$PWD/pmbootstrap:$PATH"
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" config device motorola-nio
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" config kernel mainline
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" config ui phosh
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" config user user
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" config hostname moto-g100

      - name: Show status
        run: |
          export PATH="$PWD/pmbootstrap:$PATH"
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" status

      - name: Build installation
        run: |
          export PATH="$PWD/pmbootstrap:$PATH"
          python3 ./pmbootstrap/pmbootstrap.py -y -w "$PMB_WORK" install --password 147147 --split

      - name: Export artifacts
        run: |
          export PATH="$PWD/pmbootstrap:$PATH"
          mkdir -p "$PMB_EXPORT"
          python3 ./pmbootstrap/pmbootstrap.py -w "$PMB_WORK" export "$PMB_EXPORT"
          find "$PMB_EXPORT" -maxdepth 2 -type f -ls

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-motorola-nio
          path: ${{ env.PMB_EXPORT }}/**
          if-no-files-found: error
          retention-days: 7
